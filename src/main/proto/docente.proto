syntax = "proto3";

option java_package = "ec.edu.uteq.sga.grpc";
option java_outer_classname = "DocenteProto";
option java_multiple_files = true;

package docente;

// ── Servicio principal ─────────────────────────────
service DocenteService {
  rpc ObtenerAsignaciones (AsignacionRequest) returns (AsignacionesResponse);
  rpc ObtenerCalificaciones (CalificacionRequest) returns (CalificacionesResponse);
  rpc RegistrarCalificacion (NuevaCalificacion) returns (CalificacionResponse);
}

// ── Mensajes de Asignaciones ───────────────────────
message AsignacionRequest {
  int64 id_docente = 1;
  int64 id_ano_lectivo = 2;
}

message AsignacionDTO {
  int64 id_asignacion = 1;
  string asignatura = 2;
  string grado = 3;
  string paralelo = 4;
  bool es_tutor = 5;
}

message AsignacionesResponse {
  repeated AsignacionDTO asignaciones = 1;
}

// ── Mensajes de Calificaciones ─────────────────────
message CalificacionRequest {
  int64 id_matricula = 1;
  int64 id_asignacion = 2;
  int32 trimestre = 3;
}

message CalificacionDTO {
  int64 id_calificacion = 1;
  string actividad = 2;
  string tipo_actividad = 3;
  double nota = 4;
  int32 trimestre = 5;
  string fecha = 6;
}

message CalificacionesResponse {
  repeated CalificacionDTO calificaciones = 1;
  double promedio_formativo = 2;
  double promedio_sumativo = 3;
  double promedio_final = 4;
}

// ── Mensajes para registrar calificación ──────────
message NuevaCalificacion {
  int64 id_matricula = 1;
  int64 id_asignacion = 2;
  string actividad = 3;
  string tipo_actividad = 4;
  double nota = 5;
  int32 trimestre = 6;
}

message CalificacionResponse {
  bool exitoso = 1;
  string mensaje = 2;
  int64 id_calificacion = 3;
}