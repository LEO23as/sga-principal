# Servidor
server.port=8080
spring.application.name=sga-principal

# Base de datos Supabase (puerto 6543 = pooler transaccional, soporta muchos clientes;
# el 5432 es session mode y solo permite 15 conexiones para TODO el proyecto Supabase)
spring.datasource.url=jdbc:postgresql://localhost:5433/sga
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=4

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.default_schema=sga_principal
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# JWT
jwt.secret=sga-provincias-unidas-secret-key-2026-ecuador-uteq-sistemas
jwt.expiration=86400000
# CORREO (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kbedonv@uteq.edu.ec
spring.mail.password=wftctyvpwbxwpfhe
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8


logging.level.org.springframework.security=DEBUG

# gRPC cliente hacia MICRO-DOCENTE (reemplaza el antiguo XML-RPC, solo usado en una presentación anterior)
# MICRO-DOCENTE debe levantar su servidor gRPC en este mismo puerto usando docente.proto
grpc.client.docente-service.address=static://localhost:9091
grpc.client.docente-service.negotiationType=PLAINTEXT

# gRPC servidor propio - aquí se conectan Secretaría, Soporte, etc. usando principal.proto
grpc.server.port=9092
# Desactiva la seguridad propia de gRPC (usamos la comunicación interna sin JWT por ahora)
spring.autoconfigure.exclude=net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration